## 2026 FIFA World Cup — 試合結果 DB (single source of truth)
## 消化済みの試合の「生の結果」だけをここに記録する。順位表は scripts/standings.py が
## ここから計算して導出する (= 順位を手で二重管理しない)。試合が増えたら下に追記。
##
## schema: {no, group, md(matchday), date, home, away, hg(home goals), ag(away goals), note?}
##   no = FIFA公式試合番号 (1-104)。 fixtures.yaml の no と同一の join key (= 突合は名前一致でなく no で堅牢化、 2026-06-25 付与)。
##     出典: 消化済は FIFA公式レポート PDF ファイル名 PMSR-M<NN> (fifatrainingcentre.com)、 一部は en.wikipedia の Match番号 placeholder。
##     消去法/規則確定 = M47 (block bijection)・M51/M52 (B組MD3、 slot5<slot6 規則を C/A/E で検証)。 scripts/check-match-numbers.py が fixtures との一致を検算。
##   date = 現地(北米)開催日。 JST では遅い試合は翌日 (例: F組 第1節は現地6/14=日本6/15)。
##   勝敗・順位の判定に使うのは group/home/away/hg/ag のみ。 date/md/note は記録用 (no も判定には未使用、 識別用)。
## チーム名は fixtures.yaml と統一 (アメリカ合衆国 / ボスニア・ヘルツェゴビナ / コンゴ民主共和国 等)。
## 出典: 英語版 Wikipedia 各グループ + FIFA公式 + 日本各紙 を 2 ソース以上で突合 (2026-06-21 取得)。

meta:
  tournament: "2026 FIFA World Cup"
  stage: group
  as_of: "2026-06-25"          # JST スナップショット日
  date_basis: "現地(北米)開催日"
  note: "A・B・C組=全3節完了(各6試合) + D〜L組=第2節まで。計54/72試合記録済。A組第3節完了で確定: メキシコ9点(+6)で全勝首位・南アフリカ4点(2位、W杯初の決勝T進出)・韓国3点(3位)・チェコ1点(4位)で敗退(チェコ0-3メキシコ=チャベス/キニョネス/フィダルゴ)。B組: スイス7点で逆転首位・カナダ4点(+5)2位・ボスニア4点(-1)初勝利3位・カタール2大会連続GL敗退。C組: ブラジル7点(+6)首位・モロッコ7点(+3)2位で共に突破・スコットランド3点3位・ハイチ0点4位。残るD〜L組第3節は現地6/25-27に消化予定。"
  # FIFA 2026 tiebreak の criterion 6 (フェアプレー/規律点) と 7 (FIFAランク)。
  # criterion 1-5 (直接対決 + 全体得失差/総得点) で決着しない組のみ、 FIFA公式順位の裏取りとして記録する。
  # conduct = team conduct (fair play) points = カード減点 (高い方=上位)。
  tiebreak:
    conduct:
      コンゴ民主共和国: -1
      ポルトガル: -3
    source: "en.wikipedia『2026 FIFA World Cup Group K』Discipline 注記 (2026-06-23 取得): K組2-3位はチーム規律点 コンゴ民主 -1 / ポルトガル -3 で確定 (コンゴが上位)"

