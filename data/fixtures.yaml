## 2026 FIFA World Cup — 試合日程 SoT (single source of truth)
## このファイルが正本。個人カレンダー登録機構 (別 private リポ) と公開サイト build の共有 SoT。
##
## 時刻: 日本時間 (JST=UTC+9)。start_jst は ISO8601 (+09:00)。
## データ出典: 英語版 Wikipedia 各グループ/knockout ページ (UTC offset 一次ソース)
##   + ESPN + 日本語ソース(tv-tokyo/Yahoo) のクロスチェック (2026-06-21 取得)。
## 決勝T(r32 以降)は対戦カード未定 → label はブラケットスロット(グループ順位/勝者)。
##   グループ最終戦の結果で実カードが確定したら label を更新して再実行 (冪等)。
##
## stage: group | r32 | r16 | qf | sf | third | final
## jp: true = 日本が確定で絡む試合 (タイトルに 🇯🇵)
## reconcile: existing = 既にカレンダーに別途登録済 (重複作成しない、update で標準化)
## tv: 日本の地上波放送局 (NHK総合 / 日テレ系 / フジ系)。 "なし" = 地上波放送なし (BS4K/DAZN のみ)、
##   field 無し = 未発表。 決勝T 分は 2026-07-03 に Goal.com 地上波一覧 + キックオフカレンダーの
##   2 ソース突合で記入 (一致分のみ)。 2026-07-05 に Goal.com + footballchannel.jp の再突合で
##   QF 4 試合を全確定 (M97/M100 = 地上波なし = BS4K/DAZN のみ)、 かつ既存 R16 8試合 + SF/3位/決勝
##   の tv 記入を 3 ソース目 = NHK 公式ラインアップ発表 (15試合内訳、 オリコン/Yahooニュース) と突合
##   して完全一致 (差分ゼロ)。 発表され次第ここに追記すると、 個人カレンダーの description と
##   公開サイトの放映予定表示の両方に反映される。

