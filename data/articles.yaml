## 2026 FIFA World Cup — 試合ごとの「良記事・リンク」DB (single source of truth)
## 試合に紐づく良い記事 / ブログ / 掲示板リンクをここに記録する。
## 閲覧用ビュー (articles.md) は scripts/articles.py が決定論的に生成する (= 二重管理しない)。
##
## 構造: matches[] = 試合ごとのブロック。各ブロックに refs[] (リンク一覧)。
##   match block (group stage): {key, group, md, date, title, refs[]}
##     key   = 安定キー (例: F-md2-JPN-TUN)。results.yaml の (group, md) と疎結合で照合される。
##     title = 表示名 (例: "日本 4-0 チュニジア")。
##   match block (knockout):    {key, "no", stage, date, title, refs[]}   # group/md は無い
##     "no"  = FIFA公式試合番号 (73-104)、 fixtures.yaml / results.yaml と共有 join key
##             (PyYAML が裸 no: を bool False に解釈する罠回避のため必ずクォート)。
##     stage = r32 | r16 | qf | sf | third | final (任意、 display 用)。
##     key   = 安定キー (例: M76-BRA-JPN)。 group stage の "G-mdN-..." と非衝突な命名で。
##     bracket ページが no で照合してリンク button を描画。
##   ref:   {cat, title, url, source, lang?, note?}
##     cat   = 報道・公式 / 分析・展望 / 海外の反応 / 掲示板・まとめ (この4種。順序は script 側)
##     source= 媒体名 (FIFA公式 / NHK / サッカーキング 等)
##     note  = 一言メモ (なぜ良いか・何が読めるか)
## リンクは憶測で足さず、実際に見つけたものを記録する。
## リンクは best-effort: 未着でも公開を止めない (= scripts/articles.py docstring「スコアと
## 記事リンクの分離」 節が canonical SoT、 本ヘッダはそれを pointer 参照するだけ)。
##
## リンク優先順位 (本ヘッダが canonical SoT、 他 doc は本節を pointer 参照):
##   3 段の tier 進行 ⓪ → ② → ①。 各試合は ja 側に存在する最上位 tier を採用する。
##   FIFA は通常 ⓪→②→① の順で時間差配信するので、 試合直後は ⓪ や ②、 数時間〜半日で ① に昇格する。
##   後段が配信されたら primary を必ず upgrade する (= 動画のまま記事を放置しない、 2026-06-30 違反 sweep 起点)。
##
##   ① 日本語版マッチレポート記事 /ja/…/articles/<slug>-ja が配信済ならそれ
##     (Brave〔Claude in Chrome〕で実ページをナビゲートしライブ検証済、 2026-06-23、 実在 ∧ 試合一致〔h1見出し〕、 404 ゼロ)。
##   ② ① 未配信なら FIFA公式ハイライト動画 /ja/watch/<id> にリンク (英語記事より言語非依存の動画を優先、 2026-06-23 方針確定)。
##     動画 URL は web 検索で /en/watch/<id> の実在 ∧ 試合〔チーム・スコア〕一致を確認、
##     ja は同一 content ID を ja ロケール配信 (FIFA+ 標準)。
##   ⓪ ② も未配信 (= ja 側にレポートも動画も無い) なら **リンクを足さない**: 試合 entry を
##     articles.yaml に書かない or refs を空のまま。 公開ページは結果スコアだけ表示し、 リンク
##     button は出ない (= articles.py docstring「スコアと記事リンクの分離」 節、 best-effort)。
##     未来試合 (まだ開催前) も ⓪ で扱う。 推測 URL を埋めない (= 死リンクの温床)。
##
##   現在 ② 止まりは 5 試合 (CIV-ECU/IRN-NZL/KSA-URU/AUT-JOR/SUI-ALG、 2026-07-04 snapshot、
##   ja 記事配信で随時 ① に昇格する)。 ↑この list と件数は 30 分 cron の §6 sweep が自動 maintain する。
##   Tier 進行 (⓪→②→①) は 2 段で自動化:
##     ⓪→② = AUTO_UPDATE.md §3 backfill (= scripts/articles.py --check の pending list を毎 run 再探索、
##             link 完全不在の試合を WebSearch で探す)
##     ②→① = AUTO_UPDATE.md §6 upgrade sweep (= video-primary を毎 run WebSearch で再 audit、
##             ja 記事配信を検出したら upgrade、 2026-06-30 設置)
##   2026-06-30 初回手動 sweep で 7 件 (NOR-SEN/SUI-CAN/BIH-QAT/CPV-KSA/URU-ESP/RSA-CAN/GER-PAR) を
##   ②→① 一括昇格、 以降は新規 ② が追加されてから ja 記事配信まで約 30 分〜数時間で自動 upgrade される。
##
##   マッチセンター (スタッツ頁) は使わない (レポートでも動画でもないため、 ⓪ の方がマシ)。
##   en ページの URL 変換は build.py の fifa_localize() が決定論的に行う (/ja/→/en/、 記事は語尾 -ja 除去、
##   /watch/ は ID 不変)。 規則破れは ref の url_en で明示上書き。

meta:
  tournament: "2026 FIFA World Cup"
  note: "試合ごとに、報道・分析・海外反応・掲示板の良リンクを束ねる。結果の生事実は results.yaml が SoT。"

