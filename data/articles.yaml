## 2026 FIFA World Cup — 試合ごとの「良記事・リンク」DB (single source of truth)
## 試合に紐づく良い記事 / ブログ / 掲示板リンクをここに記録する。
## 閲覧用ビュー (articles.md) は scripts/articles.py が決定論的に生成する (= 二重管理しない)。
##
## 構造: matches[] = 試合ごとのブロック。各ブロックに refs[] (リンク一覧)。
##   match block: {key, group, md, date, title, refs[]}
##     key   = 安定キー (例: F-md2-JPN-TUN)。results.yaml の (group, md) と疎結合で照合される。
##     title = 表示名 (例: "日本 4-0 チュニジア")。
##   ref:   {cat, title, url, source, lang?, note?}
##     cat   = 報道・公式 / 分析・展望 / 海外の反応 / 掲示板・まとめ (この4種。順序は script 側)
##     source= 媒体名 (FIFA公式 / NHK / サッカーキング 等)
##     note  = 一言メモ (なぜ良いか・何が読めるか)
## リンクは憶測で足さず、実際に見つけたものを記録する。
## FIFA公式マッチレポート(日本語)は全消化試合に1本ずつ付与済 (2026-06-23 backfill)。
##   日本語の記事版が未配信の5試合は FIFA公式ハイライト動画(FIFA+ /watch/<id>)で代替
##   (2026-06-23 差し替え。 以前はマッチセンター=スタッツ頁を貼っていたが「動画ではない」ため動画へ修正)。
##   記事版URLは Brave (Claude in Chrome) で実ページをナビゲートしてライブ検証済
##   (2026-06-23、 実在 ∧ 試合一致〔h1見出しが該当カードと整合〕、 404 ゼロ)。
##   動画URLは web 検索で /en/watch/<id> の実在 ∧ 試合(チーム・スコア)一致を確認。
##   ja は同一 content ID を ja ロケールで配信(FIFA+ 標準)。 build.py が en へ /ja/→/en/ 変換。

